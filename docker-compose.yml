services:
  postgres:
    image: postgres:16-alpine
    container_name: controle_fazendas_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: controle
      POSTGRES_PASSWORD: controle123
      POSTGRES_DB: controle_fazendas
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
