<script type="text/javascript">
    $(function () {
        $(".linkGenealogia").on("click", function () {
            ordem = $(this).attr("data-ordem");
            ListaGenealogia.push($("#id_principal").attr("data-ordem")); //adiciona o animal clicado da genealogia na lista
            NavegaGenealogia(ordem);
            $(".linkVoltarGenealogia").show();
        });


        $(".linkVoltarGenealogia").on("click", function () {
            $(this).hide();
            if (ListaGenealogia.length > 0) {
                    ordem = ListaGenealogia[ListaGenealogia.length - 1];
                ListaGenealogia.splice(ListaGenealogia.length - 1, 1); //remove o último da lista    
                NavegaGenealogia(ordem); //busca o últim da lista
            } 
        });

        function NavegaGenealogia(ordem) {
            Param = {
                "ordem": ordem
            }

            $("#divBuscaFilhosDoAnimal").hide();
            $("#divMostraGenealogiaDosFilhos").hide();

            $.CarregaPartial("PreencheGenealogiaDoAnimal", "ConsultaIndividual", "", Param, true, function (r) {
                $("#modalPrincipalConteudo").html(r).show();

                if (ListaGenealogia.length == 0) {
                    $(".linkVoltarGenealogia").hide();
                } else {
                    $(".linkVoltarGenealogia").show();
                }
            });
        }

        $(".linkGenealogiaError").on("click", function () {
            $(this).ABCZAlerta({
                Type: 'alert-warning',
                TitleMessage: 'Atenção',
                BodyMessage: 'O proprietário não permite a consulta desse animal!'
            });
            return false;
        });

    });
</script>
